services:
  zefix:
    image: ghcr.io/johnphilipp/mcp-server-zefix:latest
    restart: unless-stopped
    environment:
      - MCP_API_KEY=${MCP_API_KEY}
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
